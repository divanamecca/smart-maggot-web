<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Maggot Farming</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="login-card">
        <div class="left-side">
            <img src="{{ url_for('static', filename='img/login_illustration.png') }}" alt="Illustration">
        </div>
        <div class="right-side">
            <div class="brand">
                <span style="font-size:1.5rem">🐛</span> Smart Maggot Farming
            </div>
            <h4>Welcome Back</h4>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} py-2 text-center" style="font-size: 0.9rem;">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="e.g., yourname@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        <span>Password</span>
                        <a href="#" style="color: #888; text-decoration: none; font-weight: normal;">show password</a>
                    </label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-success w-100">Login</button>
            </form>
            <div class="bottom-links">
                <a href="#">Forgot Password?</a>
                <span>Don't have an account? <a href="/register" class="signup">Sign Up</a></span>
            </div>
        </div>
    </div>
</body>
</html>
